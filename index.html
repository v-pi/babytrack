<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>BabyTrack</title>
  <meta name="theme-color" content="#f7e8f0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="BabyTrack"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --pink:#e8649a;--pink-light:#fdf0f6;--pink-mid:#f7d6e8;
      --blue:#5b8fe8;--blue-light:#eef3fd;
      --green:#4caf82;--green-light:#eaf7f1;
      --amber:#e8a84e;--amber-light:#fdf4e3;
      --text:#2c2c2c;--text-muted:#888;
      --bg:#f4f4f6;--card:#fff;--border:#ebebeb;
      --radius:16px;--radius-sm:10px;
      --shadow:0 1px 8px rgba(0,0,0,.07);
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden}

    /* HEADER */
    .header{background:var(--card);padding:14px 20px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .header h1{font-size:20px;font-weight:700;color:var(--pink);letter-spacing:-.3px}
    .header .hdate{font-size:13px;color:var(--text-muted)}

    /* CONTENT */
    .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

    /* TABS */
    .tabs{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
    .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;gap:3px;cursor:pointer;border:none;background:none;color:var(--text-muted);font-size:10px;font-weight:500;-webkit-tap-highlight-color:transparent}
    .tab.active{color:var(--pink)}
    .tab svg{width:21px;height:21px}
    .tab-dot{width:4px;height:4px;border-radius:50%;background:var(--pink);display:none}
    .tab.active .tab-dot{display:block}

    .section{display:none}
    .section.active{display:block}

    /* CARD */
    .card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
    .card-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px}

    /* BREAST BTNS */
    .breast-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .breast-btn{border:none;border-radius:var(--radius);padding:16px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;position:relative;width:100%;transition:transform .1s}
    .breast-btn:active{transform:scale(.97)}
    .breast-btn.left{background:var(--pink-light)}
    .breast-btn.right{background:var(--blue-light)}
    .breast-btn.running.left{background:var(--pink-mid)}
    .breast-btn.running.right{background:#d6e4fa}
    .b-icon{font-size:24px}
    .b-label{font-size:12px;font-weight:600}
    .breast-btn.left .b-label{color:var(--pink)}
    .breast-btn.right .b-label{color:var(--blue)}
    .b-timer{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
    .breast-btn.left .b-timer{color:var(--pink)}
    .breast-btn.right .b-timer{color:var(--blue)}
    .status-dot{width:7px;height:7px;border-radius:50%;background:#ddd;position:absolute;top:10px;right:10px}
    .breast-btn.running .status-dot{background:#4caf50}
    .last-feed{font-size:11px;color:var(--text-muted);text-align:center;margin-top:3px;min-height:15px}

    /* SLEEP BTN */
    .sleep-btn{width:100%;border:none;border-radius:var(--radius);padding:18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--green-light);-webkit-tap-highlight-color:transparent;transition:transform .1s}
    .sleep-btn:active{transform:scale(.99)}
    .sleep-btn.sleeping{background:#d4f0e3}
    .sleep-left{display:flex;align-items:center;gap:12px}
    .sleep-icon{font-size:28px}
    .sleep-label{font-size:15px;font-weight:700;color:var(--green)}
    .sleep-sub{font-size:12px;color:var(--text-muted);margin-top:2px}
    .sleep-timer{font-size:22px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums}

    /* DIAPER BTNS */
    .diaper-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .diaper-btn{border:none;border-radius:var(--radius);padding:16px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;transition:transform .1s}
    .diaper-btn:active{transform:scale(.96)}
    .diaper-btn.wet{background:var(--blue-light)}
    .diaper-btn.dirty{background:var(--amber-light)}
    .d-icon{font-size:24px}
    .d-label{font-size:12px;font-weight:600}
    .diaper-btn.wet .d-label{color:var(--blue)}
    .diaper-btn.dirty .d-label{color:var(--amber)}
    .d-count{font-size:22px;font-weight:700}
    .diaper-btn.wet .d-count{color:var(--blue)}
    .diaper-btn.dirty .d-count{color:var(--amber)}
    .d-sub{font-size:11px;color:var(--text-muted)}

    /* SUMMARY */
    .summary-row{display:flex;gap:10px;margin-bottom:14px}
    .summary-chip{flex:1;background:var(--card);border-radius:var(--radius-sm);padding:10px 12px;box-shadow:var(--shadow);text-align:center}
    .s-val{font-size:20px;font-weight:700}
    .s-lab{font-size:11px;color:var(--text-muted);margin-top:2px}
    .summary-chip.pink .s-val{color:var(--pink)}
    .summary-chip.blue .s-val{color:var(--blue)}
    .summary-chip.green .s-val{color:var(--green)}

    /* HISTORY */
    .section-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
    .day-group{margin-bottom:16px}
    .day-group-label{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .day-group-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .history-list{display:flex;flex-direction:column;gap:7px}
    .history-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);box-shadow:var(--shadow);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background .1s}
    .history-item:active{background:#f7f7f7}
    .h-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .h-dot.left{background:var(--pink)}
    .h-dot.right{background:var(--blue)}
    .h-dot.sleep{background:var(--green)}
    .h-dot.wet{background:var(--blue)}
    .h-dot.dirty{background:var(--amber)}
    .h-main{flex:1;min-width:0}
    .h-label{font-size:13px;font-weight:600}
    .h-range{font-size:12px;color:var(--text-muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .h-dur{font-size:13px;font-weight:600;color:var(--text-muted);flex-shrink:0}
    .h-edit-hint{font-size:10px;color:var(--border);flex-shrink:0;margin-left:4px}

    .empty-state{text-align:center;color:var(--text-muted);font-size:13px;padding:20px 0}

    /* EXPORT BTN */
    .export-btn{width:100%;border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:12px;background:none;cursor:pointer;font-size:13px;color:var(--text-muted);font-weight:500;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:14px}
    .export-btn:active{background:var(--bg)}

    /* TIMELINE NAV */
    .tl-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
    .tl-nav-btn{border:none;background:none;cursor:pointer;font-size:22px;color:var(--pink);padding:4px 8px;border-radius:8px;-webkit-tap-highlight-color:transparent;line-height:1;transition:opacity .15s}
    .tl-nav-btn:active{opacity:.5}
    .tl-nav-btn:disabled{color:var(--border);cursor:default}
    .tl-nav-label{font-size:15px;font-weight:700;color:var(--text);flex:1;text-align:center}
    .tl-swipe-hint{font-size:11px;color:var(--text-muted);text-align:center;margin-bottom:10px;opacity:.7}

    /* TIMELINE */
    .timeline-day{background:var(--card);border-radius:var(--radius);margin-bottom:12px;box-shadow:var(--shadow)}
    .tl-header{padding:12px 14px 6px}
    .tl-day-label{font-size:14px;font-weight:700;color:var(--text)}
    .tl-stats{font-size:11px;color:var(--text-muted);margin-top:3px;display:flex;flex-wrap:wrap;gap:5px}
    .tl-body{padding:4px 14px 14px;display:flex;flex-direction:column;gap:8px}
    .tl-ticks-row{display:flex;align-items:center;gap:8px}
    .tl-tick-spacer{width:22px;flex-shrink:0}
    .tl-ticks{position:relative;flex:1;height:16px}
    .tl-tick{position:absolute;display:flex;flex-direction:column;align-items:center}
    .tl-tick-line{width:1px;height:5px;background:var(--border)}
    .tl-tick-lbl{font-size:9px;color:var(--text-muted);transform:translateX(-50%);white-space:nowrap;margin-top:1px}
    .tl-row{display:flex;align-items:center;gap:8px}
    .tl-row-label{font-size:15px;width:22px;flex-shrink:0;text-align:center}
    .tl-track{position:relative;flex:1;height:14px;border-radius:7px}
    .tl-track.feed-track{background:#fdf0f6}
    .tl-track.sleep-track{background:#eaf7f1}
    .tl-track.diaper-track{background:var(--bg);height:16px;border-radius:8px}
    .tl-bar{position:absolute;top:50%;transform:translateY(-50%);border-radius:4px;min-width:5px;height:10px}
    .tl-bar.left{background:var(--pink);opacity:.9}
    .tl-bar.right{background:var(--blue);opacity:.9}
    .tl-bar.sleep{background:var(--green);opacity:.8;border-radius:5px}
    .tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;border:2px solid var(--card)}
    .tl-dot.wet{background:var(--blue)}
    .tl-dot.dirty{background:var(--amber)}
    .tl-legend{display:flex;flex-wrap:wrap;gap:10px;padding:10px 14px;border-top:1px solid var(--border)}
    .tl-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}
    .tl-leg-bar{width:14px;height:8px;border-radius:3px}
    .tl-leg-dot{width:9px;height:9px;border-radius:50%}
    .tl-leg-bar.left{background:var(--pink)}
    .tl-leg-bar.right{background:var(--blue)}
    .tl-leg-bar.sleep{background:var(--green)}
    .tl-leg-dot.wet{background:var(--blue)}
    .tl-leg-dot.dirty{background:var(--amber)}

    /* Swipe transition */
    #timeline-container{transition:opacity .15s}
    #timeline-container.swiping{opacity:0}

    /* EDIT MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.open{opacity:1;pointer-events:all}
    .modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px 20px calc(20px + env(safe-area-inset-bottom,0px));transform:translateY(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);max-height:90dvh;overflow-y:auto}
    .modal-overlay.open .modal{transform:translateY(0)}
    .modal-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--text)}
    .modal-field{margin-bottom:14px}
    .modal-field label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px}
    .modal-row{display:flex;gap:12px;margin-bottom:14px}
    .modal-row .modal-field{margin-bottom:0;flex:1}
    .modal-field input[type=time], .modal-field input[type=date]{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;color:var(--text);background:var(--bg);font-family:inherit;-webkit-appearance:none;appearance:none}
    .modal-field input[type=time]:focus, .modal-field input[type=date]:focus{outline:none;border-color:var(--pink)}
    .modal-actions{display:flex;gap:10px;margin-top:18px}
    .btn{flex:1;border:none;border-radius:var(--radius-sm);padding:13px;font-size:14px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .1s}
    .btn:active{opacity:.8}
    .btn-delete{background:#ffeef4;color:#c0344a}
    .btn-cancel{background:var(--bg);color:var(--text-muted)}
    .btn-save{background:var(--pink);color:#fff}

    /* ANIMATIONS */
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
    .running .b-timer,.sleeping .sleep-timer{animation:pulse 2s infinite}

    /* TOAST */
    .toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(16px);background:#2c2c2c;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;pointer-events:none;z-index:200;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div class="header">
  <h1>🌸 BabyTrack</h1>
  <span class="hdate" id="today-date"></span>
</div>

<div class="content">

  <!-- ── ALLAITEMENT ── -->
  <div class="section active" id="section-feed">
    <div class="card">
      <div class="card-title">Allaitement</div>
      <div class="breast-grid">
        <div>
          <button class="breast-btn left" id="btn-left" onclick="toggleBreast('left')">
            <div class="status-dot"></div>
            <div class="b-icon">🤱</div>
            <div class="b-label">Sein gauche</div>
            <div class="b-timer" id="timer-left">00:00</div>
          </button>
          <div class="last-feed" id="last-left"></div>
        </div>
        <div>
          <button class="breast-btn right" id="btn-right" onclick="toggleBreast('right')">
            <div class="status-dot"></div>
            <div class="b-icon">🤱</div>
            <div class="b-label">Sein droit</div>
            <div class="b-timer" id="timer-right">00:00</div>
          </button>
          <div class="last-feed" id="last-right"></div>
        </div>
      </div>
    </div>
    <div class="summary-row">
      <div class="summary-chip pink"><div class="s-val" id="sum-feed-count">0</div><div class="s-lab">tétées auj.</div></div>
      <div class="summary-chip blue"><div class="s-val" id="sum-feed-total">0 min</div><div class="s-lab">durée totale</div></div>
    </div>
    <div class="section-label">Tout l'historique</div>
    <div id="feed-history"></div>
  </div>

  <!-- ── SOMMEIL ── -->
  <div class="section" id="section-sleep">
    <div class="card">
      <div class="card-title">Sommeil</div>
      <button class="sleep-btn" id="sleep-btn" onclick="toggleSleep()">
        <div class="sleep-left">
          <div class="sleep-icon" id="sleep-icon">😴</div>
          <div>
            <div class="sleep-label" id="sleep-label">Début du sommeil</div>
            <div class="sleep-sub" id="sleep-sub">Appuyer pour commencer</div>
          </div>
        </div>
        <div class="sleep-timer" id="sleep-timer">--:--</div>
      </button>
    </div>
    <div class="summary-row">
      <div class="summary-chip green"><div class="s-val" id="sum-sleep-count">0</div><div class="s-lab">siestes auj.</div></div>
      <div class="summary-chip blue"><div class="s-val" id="sum-sleep-total">0 min</div><div class="s-lab">sommeil total</div></div>
    </div>
    <div class="section-label">Tout l'historique</div>
    <div id="sleep-history"></div>
  </div>

  <!-- ── COUCHES ── -->
  <div class="section" id="section-diaper">
    <div class="card">
      <div class="card-title">Changement de couche</div>
      <div class="diaper-grid">
        <button class="diaper-btn wet" onclick="logDiaper('wet')">
          <div class="d-icon">💧</div><div class="d-label">Pipi</div>
          <div class="d-count" id="diaper-wet-count">0</div>
          <div class="d-sub">aujourd'hui</div>
        </button>
        <button class="diaper-btn dirty" onclick="logDiaper('dirty')">
          <div class="d-icon">💩</div><div class="d-label">Selle</div>
          <div class="d-count" id="diaper-dirty-count">0</div>
          <div class="d-sub">aujourd'hui</div>
        </button>
      </div>
    </div>
    <div class="section-label">Tout l'historique</div>
    <div id="diaper-history"></div>
  </div>

  <!-- ── CALENDRIER ── -->
  <div class="section" id="section-timeline">
    <button class="export-btn" onclick="exportCSV()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exporter en CSV
    </button>

    <!-- Day navigation bar -->
    <div class="tl-nav">
      <button class="tl-nav-btn" id="tl-nav-prev" onclick="tlNav(+1)" title="Jour précédent">‹</button>
      <div class="tl-nav-label" id="tl-nav-label">—</div>
      <button class="tl-nav-btn" id="tl-nav-next" onclick="tlNav(-1)" title="Jour suivant">›</button>
    </div>
    <div class="tl-swipe-hint">← glisser pour naviguer →</div>

    <div class="card" style="padding:12px 14px;margin-bottom:14px">
      <div class="tl-legend" style="padding:0;border:none">
        <div class="tl-leg-item"><div class="tl-leg-bar left"></div>Sein gauche</div>
        <div class="tl-leg-item"><div class="tl-leg-bar right"></div>Sein droit</div>
        <div class="tl-leg-item"><div class="tl-leg-bar sleep"></div>Sommeil</div>
        <div class="tl-leg-item"><div class="tl-leg-dot wet" style="border:none"></div>Pipi</div>
        <div class="tl-leg-item"><div class="tl-leg-dot dirty" style="border:none"></div>Selle</div>
      </div>
    </div>
    <div id="timeline-container"></div>
  </div>

</div><!-- .content -->

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-feed" onclick="switchTab('feed')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
    Allaitement<div class="tab-dot"></div>
  </button>
  <button class="tab" id="tab-sleep" onclick="switchTab('sleep')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    Sommeil<div class="tab-dot"></div>
  </button>
  <button class="tab" id="tab-diaper" onclick="switchTab('diaper')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="10" rx="3"/><path d="M3 11h18M8 8V6a4 4 0 0 1 8 0v2"/></svg>
    Couches<div class="tab-dot"></div>
  </button>
  <button class="tab" id="tab-timeline" onclick="switchTab('timeline')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="22"/></svg>
    Calendrier<div class="tab-dot"></div>
  </button>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Modifier</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn btn-delete" id="btn-delete" onclick="deleteEntry()">Supprimer</button>
      <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn btn-save" onclick="saveEntry()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── IndexedDB ─────────────────────────────────────────────────────────────────
const DB_NAME='babytrack', DB_VER=1, STORE='logs';
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains(STORE))
        d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true})
         .createIndex('timestamp','timestamp',{unique:false});
    };
    req.onsuccess=e=>{db=e.target.result;res()};
    req.onerror=()=>rej(req.error);
  });
}
function dbAdd(log){
  return new Promise((res,rej)=>{
    const req=db.transaction(STORE,'readwrite').objectStore(STORE).add(log);
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}
function dbPut(log){
  return new Promise((res,rej)=>{
    const req=db.transaction(STORE,'readwrite').objectStore(STORE).put(log);
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}
function dbDel(id){
  return new Promise((res,rej)=>{
    const req=db.transaction(STORE,'readwrite').objectStore(STORE).delete(id);
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}
function dbGetAll(){
  return new Promise((res,rej)=>{
    const req=db.transaction(STORE,'readonly').objectStore(STORE).getAll();
    req.onsuccess=()=>res(req.result);

}

// ── Timers (freeze-safe) ──────────────────────────────────────────────────────
let ticks={};

function startTick(id,fn){
  if(ticks[id]) clearInterval(ticks[id]);
  ticks[id]=setInterval(fn,1000);
  fn();
}
function stopTick(id){clearInterval(ticks[id]);delete ticks[id];}
function stopAllTicks(){Object.keys(ticks).forEach(stopTick);}

document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    stopAllTicks();
  } else {
    ['left','right'].forEach(side=>{
      if(breastActive[side])
        startTick('b-'+side,()=>{
          const el=document.getElementById('timer-'+side);
          if(el) el.textContent=fmtDur(Date.now()-breastActive[side].start);
        });
    });
    if(sleepActive)
      startTick('sleep',()=>{
        const el=document.getElementById('sleep-timer');
        if(el) el.textContent=fmtDur(Date.now()-sleepActive.start);
      });
  }
});

// ── Formatters ────────────────────────────────────────────────────────────────
function fmtDur(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0) return `${h}h${String(m%60).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
function fmtHM(ts){
  const d=new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDayLabel(d){
  const today=new Date(),yest=new Date(today);yest.setDate(today.getDate()-1);
  if(d.toDateString()===today.toDateString()) return "Aujourd'hui";
  if(d.toDateString()===yest.toDateString()) return 'Hier';
  return d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}
function fmtYMD(ts) {
  const d = new Date(ts);
  return d.toISOString().split('T')[0];
}

// ── Group logs by day ─────────────────────────────────────────────────────────
function groupByDay(logs){
  const byDay={};
  logs.forEach(l=>{
    const key=new Date(l.timestamp||l.start).toDateString();
    if(!byDay[key]) byDay[key]=[];
    byDay[key].push(l);
  });
  return Object.keys(byDay)
    .sort((a,b)=>new Date(b)-new Date(a))
    .map(key=>({label:fmtDayLabel(new Date(key)),logs:byDay[key].slice().reverse()}));
}

// ── TIMELINE ──────────────────────────────────────────────────────────────────
// tlDayIndex: 0 = most recent day, 1 = day before, etc.
// direction: swipe right (deltaX > 0) = go to previous/older day (index +1)
//            swipe left  (deltaX < 0) = go to next/newer day     (index -1)
let tlDayIndex = 0;
let tlDays = []; // sorted most recent first

function tlNav(delta){
  // delta = +1 → older (previous), delta = -1 → newer (next)
  const newIdx = tlDayIndex + delta;
  if(newIdx < 0 || newIdx >= tlDays.length) return;
  const container = document.getElementById('timeline-container');
  container.classList.add('swiping');
  setTimeout(()=>{
    tlDayIndex = newIdx;
    renderTimeline();
    container.classList.remove('swiping');
  }, 150);
}

function updateTlNav(){
  const label = document.getElementById('tl-nav-label');
  const prev  = document.getElementById('tl-nav-prev');
  const next  = document.getElementById('tl-nav-next');
  if(!tlDays.length){
    if(label) label.textContent = '—';
    if(prev)  prev.disabled = true;
    if(next)  next.disabled = true;
    return;
  }
  if(label) label.textContent = fmtDayLabel(new Date(tlDays[tlDayIndex]));
  if(prev)  prev.disabled = (tlDayIndex >= tlDays.length - 1); // no older day
  if(next)  next.disabled = (tlDayIndex <= 0);                  // no newer day
}

function renderTimeline(){
  const container = document.getElementById('timeline-container');

  // Rebuild day index from allLogs
  const byDay = {};
  allLogs.forEach(l=>{
    const key = new Date(l.timestamp||l.start).toDateString();
    if(!byDay[key]) byDay[key] = [];
    byDay[key].push(l);
  });
  tlDays = Object.keys(byDay).sort((a,b) => new Date(b) - new Date(a));

  if(!tlDays.length){
    container.innerHTML='<div class="empty-state" style="padding:40px 0">Aucune donnée enregistrée</div>';
    updateTlNav();
    return;
  }

  // Clamp index
  tlDayIndex = Math.max(0, Math.min(tlDayIndex, tlDays.length - 1));
  updateTlNav();

  const key  = tlDays[tlDayIndex];
  const logs = byDay[key];

  const MS_DAY = 86400000;
  function pct(ts){
    const d = new Date(ts);
    return +((d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds()) * 1000 / MS_DAY * 100).toFixed(3);
  }
  function dpct(ms){ return Math.max(0.8, +(ms / MS_DAY * 100).toFixed(3)); }

  const ticksHtml = [0,6,12,18,24].map(h=>{
    const p = (h/24*100).toFixed(1);
    return `<div class="tl-tick" style="left:${p}%"><div class="tl-tick-line"></div><div class="tl-tick-lbl">${String(h).padStart(2,'0')}h</div></div>`;
  }).join('');

  const feedLogs   = logs.filter(l=>l.type==='feed');
  const sleepLogs  = logs.filter(l=>l.type==='sleep');
  const diaperLogs = logs.filter(l=>l.type==='diaper');

  const feedMin  = Math.round(feedLogs.reduce((a,l)=>a+(l.duration||0),0)/60000);
  const sleepMin = Math.round(sleepLogs.reduce((a,l)=>a+(l.duration||0),0)/60000);
  const stats = [
    feedLogs.length  ? `<span style="color:var(--pink);font-weight:600">${feedLogs.length} tétée${feedLogs.length>1?'s':''} · ${feedMin} min</span>` : '',
    sleepLogs.length ? `<span style="color:var(--green);font-weight:600">${sleepMin} min sommeil</span>` : '',
    diaperLogs.length? `<span>${diaperLogs.length} couche${diaperLogs.length>1?'s':''}</span>` : ''
  ].filter(Boolean).join('<span style="color:var(--border);margin:0 3px">·</span>');

  const feedBars   = feedLogs.map(l=>`<div class="tl-bar ${l.side}" style="left:${pct(l.start)}%;width:${dpct(l.duration)}%" title="Sein ${l.side==='left'?'gauche':'droit'} ${fmtTime(l.start)} (${fmtDur(l.duration)})"></div>`).join('');
  const sleepBars  = sleepLogs.map(l=>`<div class="tl-bar sleep" style="left:${pct(l.start)}%;width:${dpct(l.duration)}%" title="Sommeil ${fmtTime(l.start)} (${fmtDur(l.duration)})"></div>`).join('');
  const diaperDots = diaperLogs.map(l=>`<div class="tl-dot ${l.diaperType}" style="left:${pct(l.timestamp)}%" title="${l.diaperType==='wet'?'Pipi':'Selle'} ${fmtTime(l.timestamp)}"></div>`).join('');

  container.innerHTML = `<div class="timeline-day">
    <div class="tl-header">
      <div class="tl-stats">${stats||'<span style="color:var(--text-muted)">Aucun événement</span>'}</div>
    </div>
    <div class="tl-body">
      <div class="tl-ticks-row"><div class="tl-tick-spacer"></div><div class="tl-ticks">${ticksHtml}</div></div>
      ${feedLogs.length  ? `<div class="tl-row"><div class="tl-row-label">🤱</div><div class="tl-track feed-track">${feedBars}</div></div>`  : ''}
      ${sleepLogs.length ? `<div class="tl-row"><div class="tl-row-label">🌙</div><div class="tl-track sleep-track">${sleepBars}</div></div>` : ''}
      ${diaperLogs.length? `<div class="tl-row"><div class="tl-row-label">💧</div><div class="tl-track diaper-track">${diaperDots}</div></div>` : ''}
    </div>
  </div>`;
}

// ── SWIPE on timeline ─────────────────────────────────────────────────────────
(function(){
  let startX = 0, startY = 0, tracking = false;
  const THRESHOLD = 50; // px

  function onTouchStart(e){
    if(e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    tracking = true;
  }
  function onTouchEnd(e){
    if(!tracking) return;
    tracking = false;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    // Only horizontal swipe (not scroll)
    if(Math.abs(dx) < THRESHOLD || Math.abs(dy) > Math.abs(dx) * 0.8) return;
    // Swipe right (dx > 0) = older/previous = tlNav(+1)
    // Swipe left  (dx < 0) = newer/next    = tlNav(-1)
    tlNav(dx > 0 ? +1 : -1);
  }

  document.getElementById('section-timeline').addEventListener('touchstart', onTouchStart, {passive:true});
  document.getElementById('section-timeline').addEventListener('touchend',   onTouchEnd,   {passive:true});
})();

let editingLog = null;

function openEdit(id) {
  editingLog = allLogs.find(l => l.id === id);

  const body = document.getElementById('modal-body');

  } else {
    body.innerHTML = `
      <div class="modal-row">
        <div class="modal-field"><label>Date début</label><input type="date" id="edit-start-date" value="${fmtYMD(editingLog.start)}"/></div>
        <div class="modal-field"><label>Heure début</label><input type="time" id="edit-start" value="${fmtHM(editingLog.start)}"/></div>
      </div>
      <div class="modal-row">

        <div class="modal-field"><label>Heure fin</label><input type="time" id="edit-end" value="${fmtHM(editingLog.end)}"/></div>
      </div>`;
  }
  overlay.classList.add('open');
}

function closeModal(e){
  if(e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  editingLog = null;
}

function applyTimeToDate(refTs, hmStr){
  const d = new Date(refTs);
  const [h,m] = hmStr.split(':').map(Number);
  d.setHours(h,m,0,0);
  return d.getTime();
}

function saveEntry() {
  if (!editingLog) return;
  const log = { ...editingLog };

  // Fonction interne pour fusionner la Date choisie et l'Heure choisie
  const combine = (dateStr, timeStr) => {
    const [y, m, d] = dateStr.split('-').map(Number);
    const [hrs, min] = timeStr.split(':').map(Number);
    return new Date(y, m - 1, d, hrs, min).getTime();
  };

  if (log.type === 'diaper') {
    log.timestamp = combine(document.getElementById('edit-date').value, document.getElementById('edit-ts').value);
  } else {
    log.start = combine(document.getElementById('edit-start-date').value, document.getElementById('edit-start').value);
    log.end = combine(document.getElementById('edit-end-date').value, document.getElementById('edit-end').value);
    log.duration = log.end - log.start;
    log.timestamp = log.end;
  }

  dbPut(log).then(() => {
    const idx = allLogs.findIndex(l => l.id === log.id);
    if (idx >= 0) allLogs[idx] = log;
    renderAll();
    closeModal();
    showToast('Modifié avec succès !');
  });
}

// ── FIX: capture id BEFORE nullifying editingLog ──────────────────────────────
function deleteEntry(){
  if(!editingLog) return;
  if(!confirm('Supprimer cet événement ?')) return;
  const id = editingLog.id;           // ← capture synchronously
  document.getElementById('modal-overlay').classList.remove('open');
  editingLog = null;                  // ← safe to null now
  dbDel(id).then(()=>{               // ← use captured id in the callback
    allLogs = allLogs.filter(l => l.id !== id);
    renderAll();
    showToast('Supprimé');
  });
}

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
function exportCSV(){
  if(!allLogs.length){showToast('Aucune donnée à exporter');return;}
  const rows=[['date','heure','type','detail','duree_min']];
  [...allLogs].sort((a,b)=>(a.timestamp||a.start)-(b.timestamp||b.start)).forEach(l=>{
    const ts   = l.timestamp||l.start;
    const date = new Date(ts).toLocaleDateString('fr-FR');
    const heure= fmtTime(ts);
    if(l.type==='feed')       rows.push([date,heure,'allaitement',l.side==='left'?'sein gauche':'sein droit',Math.round((l.duration||0)/60000)]);
    else if(l.type==='sleep') rows.push([date,heure,'sommeil',`${fmtTime(l.start)} > ${fmtTime(l.end)}`,Math.round((l.duration||0)/60000)]);
    else if(l.type==='diaper')rows.push([date,heure,'couche',l.diaperType==='wet'?'pipi':'selle','']);
  });
  const csv  = rows.map(r=>r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download=`babytrack_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('Export CSV téléchargé !');
}

// ── TABS ──────────────────────────────────────────────────────────────────────
let currentTab='feed';
function switchTab(name){
  ['feed','sleep','diaper','timeline'].forEach(t=>{
    document.getElementById('section-'+t).classList.toggle('active',t===name);
    document.getElementById('tab-'+t).classList.toggle('active',t===name);
  });
  currentTab=name;
  if(name==='timeline') renderTimeline();
}

// ── RENDER ALL ────────────────────────────────────────────────────────────────
function renderAll(){
  renderFeed(); renderSleep(); renderDiapers();
  if(currentTab==='timeline') renderTimeline();
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTO;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTO);
  toastTO=setTimeout(()=>el.classList.remove('show'),2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('today-date').textContent=new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});

openDB().then(()=>dbGetAll()).then(logs=>{
  allLogs=logs;
  loadSession();
  ['left','right'].forEach(side=>{
    if(breastActive[side]){
      document.getElementById('btn-'+side).classList.add('running');
      startTick('b-'+side,()=>{
        const el=document.getElementById('timer-'+side);
        if(el) el.textContent=fmtDur(Date.now()-breastActive[side].start);
      });
    }
  });
  if(sleepActive){
    document.getElementById('sleep-btn').classList.add('sleeping');
    document.getElementById('sleep-label').textContent='En train de dormir';
    document.getElementById('sleep-sub').textContent='Appuyer pour arrêter';
    document.getElementById('sleep-icon').textContent='🌙';
    startTick('sleep',()=>{
      const el=document.getElementById('sleep-timer');
      if(el) el.textContent=fmtDur(Date.now()-sleepActive.start);
    });
  }
  renderAll();
}).catch(()=>showToast('Erreur base de données'));

if('serviceWorker' in navigator)
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
